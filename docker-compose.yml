version: '3'
services:
  postgres-dev:
    image: postgres:15
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: gritcommit_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres-dev:/var/lib/posgresql/data
